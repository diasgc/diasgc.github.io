    <path d="M 100 125 Q 100 165 128 170 Q 156 165 156 125 Z" fill="white"/>
    <!-- Penguin eyes -->
    <circle cx="120" cy="85" r="5" fill="#0d47a1"/>
    <circle cx="136" cy="85" r="5" fill="#0d47a1"/>
    <!-- Penguin beak -->
    <path d="M 128 92 L 135 98 L 128 100 Z" fill="#ff9800"/>
    <!-- Package icon (top-right) -->
    <rect x="165" y="35" width="45" height="45" rx="5" fill="#4caf50" opacity="0.8"/>
    <path d="M 175 50 L 187.5 58 L 200 50 M 175 50 L 175 65 M 200 50 L 200 65 M 175 65 L 187.5 72.5 L 200 65" 
          stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
