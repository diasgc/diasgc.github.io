<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ubuntu Software Installation Manager">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Ubuntu Setup Installer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="manifest" href="site.webmanifest">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-content">
      <div class="navbar-left">
        <h1 class="app-title">🐧 Ubuntu Setup</h1>
      </div>
      <div class="navbar-right">
        <div class="search-wrapper">
          <input type="text" id="searchInput" class="search-input" placeholder="Search packages...">
          <span class="search-icon material-icons-outlined">search</span>
        </div>
        <button id="themeToggle" class="theme-toggle" title="Toggle dark/light mode"><span class="material-icons-outlined">dark_mode</span></button>
      </div>
    </div>
  </nav>

  <div class="container">
    <aside class="sidebar">
      <div class="filters">
        <h3>Categories</h3>
        <div class="category-list" id="categoryList"></div>
        <hr>
        <button id="selectAllBtn" class="filter-btn primary">Select All</button>
        <button id="clearAllBtn" class="filter-btn secondary">Clear All</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="header-section">
        <div class="stats">
          <div class="stat-item">
            <span class="stat-label">Selected:</span>
            <span class="stat-value" id="selectedCount">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Total:</span>
            <span class="stat-value" id="totalCount">0</span>
          </div>
        </div>
      </div>

      <div id="mainContent" class="packages-container">
        <!-- Content will be generated here -->
      </div>
    </main>
  </div>

  <footer class="footer">
    <button id="generateBtn" class="btn-generate">
      <span class="btn-icon material-icons-outlined">download</span>
      <span class="btn-text">Generate Install Script</span>
    </button>
    <div class="footer-info">
      <p id="scriptStatus"></p>
    </div>
  </footer>

  <script type="module" src="main.js"></script>
</body>
</html>
